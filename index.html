<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPERA X | Smart Logistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap');
        
        :root { 
            --brand: #3b82f6; 
            --primary: #fbbf24;
            --bg-deep: #020617; 
            --surface: #0f172a; 
        }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-deep); color: #f8fafc; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        
        .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1rem; }
        
        .nav-bar { display: flex; gap: 4px; background: #000; padding: 5px; border-radius: 1rem; border: 1px solid #1e293b; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 4px; border-radius: 0.75rem; color: #475569; cursor: pointer; transition: 0.2s; }
        .nav-item i { font-size: 1.1rem; margin-bottom: 3px; }
        .nav-item span { font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .nav-item.active { background: var(--brand); color: white; font-weight: 900; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }

        .loc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }
        .loc-card { background: var(--primary); padding: 15px 5px; border-radius: 0.75rem; text-align: center; box-shadow: 0 8px 20px rgba(251, 191, 36, 0.2); }
        .loc-label { font-size: 10px; font-weight: 900; color: #000; text-transform: uppercase; margin-bottom: 4px; display: block; opacity: 0.7; }
        .loc-value { font-size: 2.2rem; font-weight: 900; color: #000; line-height: 1; }

        .input-pro { background: #000; border: 2px solid #1e293b; color: white; border-radius: 0.75rem; font-family: 'JetBrains Mono', monospace; text-align: center; }
        .key { background: #000; border: 1px solid #1e293b; border-radius: 0.75rem; height: 60px; font-weight: 800; font-size: 1.5rem; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .key:active { background: var(--brand); }

        .simple-list-item { background: var(--surface); border-radius: 0.75rem; padding: 12px; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; border-left: 4px solid var(--brand); }
        .simple-list-code { font-family: 'JetBrains Mono', monospace; font-weight: 800; color: var(--brand); font-size: 1.1rem; }
        .simple-list-qty { background: #1e293b; padding: 4px 10px; border-radius: 20px; font-weight: 800; color: #fbbf24; }

        .notification-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; max-width: 350px; width: calc(100% - 40px); pointer-events: none; }
        .notification { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15); display: flex; align-items: flex-start; gap: 12px; transform: translateX(400px); opacity: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: auto; border-left: 4px solid transparent; }
        .notification.show { transform: translateX(0); opacity: 1; }
        .notification.success { border-left-color: #10b981; }

        .dash-chip { background: #1e293b; border: 1px solid #334155; padding: 6px 12px; border-radius: 12px; display: flex; align-items: center; gap: 10px; width: fit-content; }
        .dash-bar { height: 6px; width: 80px; background: #0f172a; border-radius: 3px; overflow: hidden; }
        .dash-fill { height: 100%; background: var(--brand); transition: width 0.5s ease; }

        @media print { 
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; }
            .print-only { display: block !important; }
            .print-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
            .print-table th, .print-table td { border: 1px solid black; padding: 8px; text-align: left; color: black !important; }
        }
        .print-only { display: none; }

        /* ESTILOS PARA FUNCIONALIDADE DE VALIDADE - PADRÃO OPERA X */
        .validade-card {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 1rem;
            padding: 1.5rem;
        }

        .validade-tabs {
            display: flex;
            gap: 0.5rem;
            background: #000;
            padding: 0.25rem;
            border-radius: 1rem;
            border: 1px solid #1e293b;
            margin-bottom: 1.5rem;
        }

        .validade-tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
        }

        .validade-tab.active {
            background: var(--brand);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .validade-upload-area {
            background: #000;
            border: 2px dashed #1e293b;
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1.5rem;
        }

        .validade-upload-area:hover {
            border-color: var(--brand);
            background: rgba(59, 130, 246, 0.1);
        }

        .validade-upload-area i {
            font-size: 2.5rem;
            color: var(--brand);
            margin-bottom: 0.5rem;
        }

        .validade-upload-area span {
            color: var(--brand);
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .validade-upload-area small {
            display: block;
            color: #475569;
            font-size: 0.7rem;
            margin-top: 0.5rem;
        }

        .modo-importacao {
            background: #000;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid #1e293b;
        }

        .modo-importacao label {
            display: block;
            margin: 0.75rem 0;
            padding: 0.75rem;
            border: 1px solid #1e293b;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modo-importacao label:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--brand);
        }

        .modo-importacao input[type="radio"] {
            margin-right: 0.75rem;
            accent-color: var(--brand);
        }

        .search-box-validade {
            background: #000;
            border: 1px solid #1e293b;
            border-radius: 1rem;
            padding: 1rem;
            margin: 1.5rem 0;
        }

        .search-box-validade .search-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #475569;
            margin-bottom: 0.75rem;
            letter-spacing: 0.05em;
        }

        .search-input-group {
            display: flex;
            gap: 0.5rem;
        }

        .search-input-group input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: white;
            font-family: 'JetBrains Mono', monospace;
        }

        .search-input-group input:focus {
            outline: none;
            border-color: var(--brand);
        }

        .search-btn {
            background: var(--brand);
            color: white;
            border: none;
            border-radius: 0.75rem;
            padding: 0 1.5rem;
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .status-card-validade {
            background: #000;
            border: 1px solid #1e293b;
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
        }

        .status-card-validade b {
            display: block;
            font-size: 2rem;
            font-weight: 800;
            color: var(--brand);
            line-height: 1;
        }

        .status-card-validade small {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #475569;
            letter-spacing: 0.05em;
        }

        .filter-info {
            background: #000;
            border: 1px solid #1e293b;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--brand);
        }

        .produto-item {
            background: var(--surface);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 0.5rem;
            border-left: 4px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .produto-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .produto-item.pendente { border-left-color: #f59e0b; }
        .produto-item.concluido { border-left-color: #10b981; opacity: 0.8; }

        .produto-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .produto-codigo {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            color: var(--brand);
            font-size: 0.9rem;
        }

        .produto-status {
            font-size: 0.6rem;
            font-weight: 700;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            text-transform: uppercase;
        }

        .status-pendente {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .status-concluido {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .produto-desc {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 0.75rem;
        }

        .produto-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.7rem;
            color: #475569;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 1.5rem;
            width: 90%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .modal-header h2 {
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--brand);
        }

        .modal-close {
            width: 2rem;
            height: 2rem;
            background: #000;
            border: 1px solid #1e293b;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            color: #475569;
        }

        .modal-info {
            background: #000;
            border-radius: 0.75rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .modal-info p {
            margin: 0.5rem 0;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .modal-info strong {
            color: white;
            font-weight: 600;
        }

        .lotes-list {
            max-height: 200px;
            overflow-y: auto;
            background: #000;
            border-radius: 0.75rem;
            padding: 0.5rem;
            margin-bottom: 1rem;
        }

        .lote-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            border-bottom: 1px solid #1e293b;
        }

        .lote-item:last-child {
            border-bottom: none;
        }

        .lote-info {
            display: flex;
            flex-direction: column;
        }

        .lote-validade {
            font-weight: 700;
            color: #10b981;
            font-size: 0.8rem;
        }

        .lote-qtd {
            font-size: 0.7rem;
            color: #475569;
        }

        .btn-remover {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.25rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.6rem;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-salvar {
            width: 100%;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 0.75rem;
            padding: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            margin: 1rem 0;
        }

        .btn-cancelar {
            width: 100%;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 0.75rem;
            padding: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            cursor: pointer;
        }

        .dica-enter {
            font-size: 0.6rem;
            color: #475569;
            text-align: center;
            margin-top: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .modal-input {
            width: 100%;
            background: #000;
            border: 2px solid #1e293b;
            border-radius: 0.75rem;
            padding: 1rem;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            text-align: center;
        }

        .modal-input:focus {
            outline: none;
            border-color: var(--brand);
        }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div id="notification-container" class="notification-container"></div>

    <div id="print-area" class="print-only">
        <h1 style="text-align:center; font-size: 24px; font-weight: 800; border-bottom: 2px solid black; padding-bottom: 10px;">LISTA DE REPOSIÇÃO - OPERA X</h1>
        <p id="print-date" style="text-align:right; font-weight: bold; margin-top: 5px;"></p>
        <table class="print-table">
            <thead>
                <tr>
                    <th>Localização</th><th>Código</th><th>Descrição</th><th>Qtd</th>
                </tr>
            </thead>
            <tbody id="print-table-body"></tbody>
        </table>
    </div>

    <div id="loader" class="fixed inset-0 z-[100] bg-slate-950/90 flex items-center justify-center hidden">
        <div class="flex flex-col items-center">
            <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-blue-500 font-bold text-xs uppercase tracking-widest">Sincronizando Base...</p>
        </div>
    </div>

    <div class="max-w-[1100px] mx-auto space-y-6 no-print">
        <header class="flex flex-col md:flex-row justify-between items-center bg-slate-900/40 p-5 rounded-2xl border border-white/5 gap-6 shadow-xl">
            <div class="flex flex-col gap-3">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg"><i class="fa-solid fa-bolt text-white text-2xl"></i></div>
                    <div>
                        <h1 class="text-2xl font-black uppercase tracking-tighter">OPERA <span class="text-blue-500">X</span></h1>
                        <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Dev: Benilson Amorim</p>
                    </div>
                </div>
                <div class="dash-chip">
                    <div class="flex flex-col">
                        <span class="text-[8px] font-black text-slate-400 uppercase">Endereçamento</span>
                        <div class="flex items-center gap-2">
                            <div class="dash-bar"><div id="dash-fill" class="dash-fill" style="width: 0%"></div></div>
                            <span id="dash-perc" class="text-[10px] font-black text-blue-400">0%</span>
                        </div>
                    </div>
                </div>
            </div>

            <nav class="nav-bar w-full md:w-auto md:min-w-[500px]">
                <div onclick="App.ui.setMode('locate')" id="btn-locate" class="nav-item active"><i class="fa-solid fa-magnifying-glass"></i><span>Localizar</span></div>
                <div onclick="App.ui.setMode('labels')" id="btn-labels" class="nav-item"><i class="fa-solid fa-barcode"></i><span>Etiquetas</span></div>
                <div onclick="App.ui.setMode('picking')" id="btn-picking" class="nav-item"><i class="fa-solid fa-truck-ramp-box"></i><span>Reposição</span></div>
                <div onclick="App.ui.setMode('validade')" id="btn-validade" class="nav-item"><i class="fa-solid fa-calendar-alt"></i><span>Validade</span></div>
                <div onclick="window.open('dashbort.html', '_blank')" class="nav-item"><i class="fa-solid fa-chart-pie"></i><span>Status</span></div>
            </nav>

            <label class="bg-slate-900 hover:bg-slate-800 text-white px-5 py-3 rounded-xl text-[10px] font-black uppercase cursor-pointer border border-slate-800 transition-all">
                <i class="fa-solid fa-file-excel text-emerald-500"></i> Atualizar Base
                <input type="file" class="hidden" accept=".xlsx,.xls" onchange="App.logic.fileHandler.handleUpload(this)">
            </label>
        </header>

        <main id="main-view" class="min-h-[60vh]"></main>
    </div>

    <div class="modal" id="modalData">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="prodNome"></h2>
                <div class="modal-close" onclick="fecharModal()">×</div>
            </div>

            <div class="modal-info" id="modalInfo"></div>

            <div id="lotesContainer">
                <div style="font-weight:600; margin-bottom:10px; color: white; font-size:0.8rem;">📦 Lotes com validade:</div>
                <div id="lotesList" class="lotes-list"></div>
            </div>

            <div id="inputContainer"></div>

            <button class="btn-cancelar" onclick="fecharModal()">FECHAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCiy4DOVPYYr_UtglmnVWUdZ8SqM26Neo8",
            authDomain: "zpl47-f751d.firebaseapp.com",
            projectId: "zpl47-f751d",
            databaseURL: "https://zpl47-f751d-default-rtdb.firebaseio.com"
        };

        const fApp = initializeApp(firebaseConfig);
        const db = getDatabase(fApp);

        const Utils = {
            cleanId: (c) => String(c || '').replace(/\D/g, '').length === 13 ? String(c).substring(7, 12) : String(c).replace(/\D/g, ''),
            formatCoord: (v) => String(v || '').replace(/^(rua|rack|rck|r|niv|col)\s*/gi, '').trim(),
            sanitizeText: (t) => String(t || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase()
        };

        const Notifications = {
            show(msg, type = 'info') {
                const container = document.getElementById('notification-container');
                const n = document.createElement('div');
                n.className = `notification ${type}`;
                n.innerHTML = `<div class="notification-content font-bold text-slate-800">${msg}</div>`;
                container.appendChild(n);
                setTimeout(() => n.classList.add('show'), 10);
                setTimeout(() => { n.classList.remove('show'); setTimeout(() => n.remove(), 300); }, 3000);
            }
        };

        window.fecharModal = () => {
            document.getElementById('modalData').style.display = 'none';
        };

        window.App = {
            state: { mode: 'locate', inventory: [], activeListener: null, validadeData: {} },

            ui: {
                setMode(mode) {
                    App.state.mode = mode;
                    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                    document.getElementById(`btn-${mode}`)?.classList.add('active');
                    if (mode === 'locate') this.renderLocate();
                    else if (mode === 'labels') this.renderLabels();
                    else if (mode === 'picking') this.renderPicking();
                    else if (mode === 'validade') this.renderValidade();
                    this.syncQueues();
                },

                updateDash() {
                    const total = App.state.inventory.length;
                    if (total === 0) return;
                    const addr = App.state.inventory.filter(p => p.RUA && p.RUA !== '-' && p.RCK && p.RCK !== '-').length;
                    const perc = ((addr / total) * 100).toFixed(1);
                    document.getElementById('dash-fill').style.width = `${perc}%`;
                    document.getElementById('dash-perc').innerText = `${perc}%`;
                },

                renderLocate() {
                    document.getElementById('main-view').innerHTML = `
                        <div class="max-w-2xl mx-auto glass p-8">
                            <input type="text" id="main-in" class="input-pro w-full py-5 text-4xl font-bold mb-8" placeholder="BIPAR CÓDIGO">
                            <div id="result-area" class="min-h-[260px] flex flex-col items-center justify-center text-center"></div>
                            <div id="keyboard" class="grid grid-cols-3 gap-3 mt-8 border-t border-white/10 pt-8"></div>
                        </div>`;
                    this.initKeyboard();
                },

                initKeyboard() {
                    const kb = document.getElementById('keyboard');
                    [1,2,3,4,5,6,7,8,9,'⌫',0,'CLR'].forEach(k => {
                        const b = document.createElement('div'); b.className = 'key'; b.textContent = k;
                        b.onclick = () => {
                            const i = document.getElementById('main-in');
                            if(k === '⌫') i.value = i.value.slice(0,-1); else if(k === 'CLR') i.value = ''; else i.value += k;
                            App.logic.processLocate(i.value);
                        };
                        kb.appendChild(b);
                    });
                },

                renderLabels() {
                    document.getElementById('main-view').innerHTML = `
                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <div class="lg:col-span-4 glass p-8 space-y-4 h-fit">
                                <h3 class="text-blue-500 font-black uppercase text-xs">Etiquetas</h3>

                },

                async copyLabelsZPL() {
                    onValue(ref(db, 'print_queue'), (snap) => {
                        if (!snap.exists()) return;
                        const items = Object.values(snap.val());
                        let zpl = "";
                        for (let i = 0; i < items.length; i += 2) {
                            zpl += "^XA^CI28^PW812^LL1218\n";
                            [0, 600].forEach((yOffset, idx) => {
                                const it = items[i + idx]; if (!it) return;
                                const addr = `RUA: ${Utils.sanitizeText(it.rua)} RCK: ${Utils.sanitizeText(it.rck)}   ${it.lin}/ ${it.col}`;
                                zpl += `^FO20,${yOffset + 20}^A0N,110,100^FD${Utils.cleanId(it.codigo)}^FS\n`;
                                if (it.val) zpl += `^FO275,${yOffset+10}^GB550,70,100^FS^FO295,${yOffset+18}^A0N,100,95^FR^FDVAL: ${it.val}^FS\n`;
                                zpl += `^FO20,${yOffset + 150}^A0N,60,60^FB770,2,0,L,0^FD${Utils.sanitizeText(it.nome)}^FS\n`;
                                zpl += `^FO20,${yOffset + 320}^A0N,45,45^FD${addr}^FS\n`;
                                if (it.qtyItems) zpl += `^FO580,${yOffset + 320}^A0N,80,80^FDQ:${it.qtyItems}^FS\n`;
                                zpl += `^BY3,3,180^FO60,${yOffset + 380}^BCN,180,Y,N,N^FD${it.codigo}^FS\n`;
                            });
                            zpl += "^XZ\n";
                        }
                        navigator.clipboard.writeText(zpl).then(() => Notifications.show('ZPL 2-por-Etiqueta Copiado!', 'success'));
                    }, { onlyOnce: true });
                },

                async addPicking() {

                        const parts = line.trim().split(/\s+/);
                        const code = parts[0], qty = parts[1] || 1, search = Utils.cleanId(code);
                        const p = App.state.inventory.find(i => Utils.cleanId(i.COD) === search) || { NOM: 'N/E' };
                        await push(ref(db, 'active_separation'), { 
                            codigo: code, nome: p.NOM, qty: qty, rua: p.RUA || '-', 
                            rck: p.RCK || '-', lin: p.LIN || '-', col: p.COL || '-'

                    document.getElementById('pick-text').value = '';

                fileHandler: {
                    handleUpload(input) {
                        const file = input.files[0]; if (!file) return;
                        const reader = new FileReader();
                        document.getElementById('loader').classList.remove('hidden');
                        reader.onload = async (e) => {
                            const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
                            const data = {};
                            for (let i = 1; i < rows.length; i++) {
                                const r = rows[i];
                                if (r[0]) {
                                    data[r[0]] = { 
                                        COD: r[0], NOM: r[1], RUA: Utils.formatCoord(r[4]), 
                                        RCK: Utils.formatCoord(r[5]), LIN: r[6], COL: r[7], EST: r[10] 
                                    };
                                }
                            }
                            await set(ref(db, 'master_products'), data);
                            document.getElementById('loader').classList.add('hidden');
                            Notifications.show('Banco Atualizado em Tempo Real!', 'success');
                        };
                        reader.readAsArrayBuffer(file);
                    }

                abrirModalValidade(codigo) {
                    const lotes = Object.entries(App.state.validadeData)
                        .map(([id, item]) => ({ id, ...item }))
                        .filter(i => i.codigo === codigo);
                    
                    if (lotes.length === 0) {
                        Notifications.show('Produto não encontrado', 'error');
                        return;
                    }

                    window.refCodigoGlobal = codigo;
                    
                    const comValidade = lotes.filter(l => l.done && l.validade);
                    const pendentes = lotes.filter(l => !l.done);
                    const totalPendente = pendentes.reduce((acc, l) => acc + (l.qtde || 0), 0);
                    const primeiroLote = lotes[0];

                    document.getElementById('prodNome').innerText = primeiroLote.desc || "Sem descrição";
                    
                    document.getElementById('modalInfo').innerHTML = `
                        <p><strong>Código:</strong> ${codigo}</p>
                        <p><strong>Origem:</strong> ${primeiroLote.origem === 'xml' ? '📄 XML' : '📦 Planilha'}</p>
                        <p><strong>Total unidades:</strong> ${lotes.reduce((acc, l) => acc + (l.qtde || 0), 0)}</p>
                    `;

                    const lotesPorValidade = new Map();
                    comValidade.forEach(l => {
                        const key = l.validade;
                        if (!lotesPorValidade.has(key)) {
                            lotesPorValidade.set(key, {
                                validade: key,
                                qtde: 0,
                                ids: []
                            });
                        }
                        const grupo = lotesPorValidade.get(key);
                        grupo.qtde += l.qtde || 0;
                        grupo.ids.push(l.id);
                    });

                    const lotesList = document.getElementById('lotesList');
                    if (comValidade.length > 0) {
                        lotesList.innerHTML = Array.from(lotesPorValidade.values()).map(grupo => `

                                <div class="lote-info">

                                </div>
                                <button class="btn-remover" onclick="App.logic.removerLotes('${grupo.ids.join(',')}')">✕</button>
                            </div>
                        `).join('');
                    } else {
                        lotesList.innerHTML = '<div style="text-align:center; padding:15px; color:#475569;">Nenhum lote com validade</div>';
                    }

                    document.getElementById('inputContainer').innerHTML = `
                        <div style="margin: 15px 0;">
                            <label style="display: block; text-align: left; font-weight: 600; margin-bottom: 5px; color: white; font-size:0.8rem;">
                                📦 Quantidade (disponível: ${totalPendente}):
                            </label>
                            <input type="number" id="inputQuantidade" class="modal-input" 
                                   placeholder="Quantidade" min="1" max="${totalPendente}" value="${totalPendente}">
                        </div>
                        <div style="margin: 15px 0;">
                            <label style="display: block; text-align: left; font-weight: 600; margin-bottom: 5px; color: white; font-size:0.8rem;">
                                📅 Data de validade (MM/AAAA):
                            </label>
                            <input type="text" id="inputMesAno" class="modal-input" placeholder="MM/AAAA" maxlength="7" oninput="App.logic.handleDateInput(this)">
                        </div>
                        <div class="dica-enter">Digite a data e pressione ENTER</div>
                        <button class="btn-salvar" onclick="App.logic.salvarDataValidade()">ADICIONAR VALIDADE</button>
                    `;

                    document.getElementById('modalData').style.display = 'flex';

                },

                async salvarDataValidade() {
                    const quantidade = parseInt(document.getElementById('inputQuantidade')?.value);
                    const data = document.getElementById('inputMesAno').value;
                    
                    if (!quantidade || quantidade <= 0) {
                        Notifications.show('Digite uma quantidade válida', 'warning');
                        return;
                    }
                    
                    if (data.length < 7) {
                        Notifications.show('Digite MM/AAAA', 'warning');
                        return;
                    }
                    
                    if (!/^\d{2}\/\d{4}$/.test(data)) {
                        Notifications.show('Formato inválido. Use MM/AAAA', 'warning');
                        return;
                    }

                    const dataSalvar = "01/" + data;
                    
                    const itensPendentes = Object.entries(App.state.validadeData)
                        .filter(([_, item]) => item.codigo === window.refCodigoGlobal && !item.done);

                    if (itensPendentes.length === 0) {
                        Notifications.show('Todos os lotes já têm validade', 'info');
                        fecharModal();
                        return;
                    }

                    const totalPendente = itensPendentes.reduce((acc, [_, item]) => acc + (item.qtde || 0), 0);
                    
                    if (quantidade > totalPendente) {
                        Notifications.show(`Quantidade indisponível. Total pendente: ${totalPendente}`, 'warning');
                        return;
                    }

                    let updates = {};
                    let quantidadeRestante = quantidade;

                    for (let [id, item] of itensPendentes) {
                        if (quantidadeRestante <= 0) break;
                        
                        const qtdDisponivel = item.qtde || 0;
                        
                        if (qtdDisponivel <= quantidadeRestante) {
                            const novoId = `${id}_VAL_${Date.now()}`.replace(/[.#$\[\]\/]/g, "_");
                            updates[`${novoId}`] = {
                                ...item,
                                validade: dataSalvar,
                                done: true,
                                qtde: qtdDisponivel
                            };
                            updates[`${id}`] = null;
                            quantidadeRestante -= qtdDisponivel;
                        } else {
                            const novoId = `${id}_VAL_${Date.now()}`.replace(/[.#$\[\]\/]/g, "_");
                            updates[`${novoId}`] = {
                                ...item,
                                validade: dataSalvar,
                                done: true,
                                qtde: quantidadeRestante
                            };
                            
                            updates[`${id}`] = {
                                ...item,
                                qtde: qtdDisponivel - quantidadeRestante
                            };
                            
                            quantidadeRestante = 0;
                        }
                    }

                    await update(ref(db, 'validade'), updates);
                    Notifications.show(`${quantidade} unidades com validade ${data} adicionadas!`, 'success');
                    fecharModal();
                },

                async removerLotes(idsString) {
                    if (!confirm('Remover estes lotes?')) return;
                    
                    const ids = idsString.split(',');
                    let updates = {};
                    ids.forEach(id => {
                        updates[id] = null;
                    });
                    
                    await update(ref(db, 'validade'), updates);
                    Notifications.show(`${ids.length} lote(s) removidos`, 'success');
                    fecharModal();
                }
            }
        };

        // Configurar listeners de upload após carregar a página
        setTimeout(() => {
            // Upload XML
            document.getElementById('xmlInputValidade')?.addEventListener('change', async (e) => {
                const files = Array.from(e.target.files);
                let total = 0;
                let updates = {};

                for (let file of files) {
                    try {
                        const text = await file.text();
                        const parser = new DOMParser();
                        const xml = parser.parseFromString(text, "text/xml");
                        
                        const nNF = xml.querySelector('nNF')?.textContent || 'S/N';
                        const itens = xml.querySelectorAll('det');

                        for (let item of itens) {
                            const prod = item.querySelector('prod');
                            if (!prod) continue;
                            
                            const codigo = prod.querySelector('cProd')?.textContent?.trim() || '';
                            const desc = prod.querySelector('xProd')?.textContent?.trim() || '';
                            
                            let qtde = 0;
                            const qCom = prod.querySelector('qCom')?.textContent;
                            if (qCom) qtde = parseFloat(qCom.replace(',', '.'));
                            
                            if (!qtde) {
                                const qTrib = prod.querySelector('qTrib')?.textContent;
                                if (qTrib) qtde = parseFloat(qTrib.replace(',', '.'));
                            }
                            
                            if (qtde <= 0) continue;

                            const id = `XML_${nNF}_${codigo}_${Date.now()}_${total}`.replace(/[.#$\[\]\/]/g, "_");
                            
                            updates[`${id}`] = {
                                nf: nNF,
                                codigo: codigo,
                                desc: desc,
                                qtde: qtde,
                                validade: '',
                                done: false,
                                origem: 'xml'
                            };
                            total++;
                        }
                    } catch (error) {
                        console.error(error);
                        Notifications.show(`Erro no arquivo ${file.name}`, 'error');
                    }
                }
                
                if (total > 0) {
                    await update(ref(db, 'validade'), updates);
                    Notifications.show(`${total} itens importados dos XMLs!`, 'success');
                }
                
                e.target.value = '';
            });

            // Upload Planilha
            document.getElementById('estoqueInputValidade')?.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const modoCadastro = document.querySelector('input[name="modoImportacao"]:checked')?.value || 'cadastro';
                
                const statusDiv = document.getElementById('estoque-status');
                statusDiv.innerHTML = 'Processando...';
                
                try {
                    const data = await file.arrayBuffer();
                    const workbook = XLSX.read(data);
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                    
                    let criados = 0;
                    let atualizados = 0;
                    let ignorados = 0;
                    let updates = {};

                    const produtosExistentes = {};
                    Object.entries(App.state.validadeData).forEach(([id, item]) => {
                        if (!produtosExistentes[item.codigo]) {
                            produtosExistentes[item.codigo] = [];
                        }
                        produtosExistentes[item.codigo].push({ id, ...item });
                    });

                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (!row || row.length < 11) continue;
                        
                        const codigo = String(row[0] || '').trim();
                        const desc = String(row[1] || '').trim();
                        const qtde = parseFloat(String(row[8] || '0').replace(',', '.')) || 0;
                        
                        if (!codigo || !desc) continue;

                        if (modoCadastro === 'cadastro') {
                            const id = `ESTOQUE_${codigo}_${Date.now()}_${i}`.replace(/[.#$\[\]\/]/g, "_");
                            
                            updates[`${id}`] = {
                                nf: 'ESTOQUE',
                                codigo: codigo,
                                desc: desc,
                                qtde: qtde,
                                validade: '',
                                done: false,
                                origem: 'estoque'
                            };
                            criados++;
                            
                        } else {
                            if (produtosExistentes[codigo]) {
                                const lotesDoProduto = produtosExistentes[codigo];
                                const quantidadeTotal = lotesDoProduto.reduce((sum, lote) => sum + (lote.qtde || 0), 0);
                                
                                if (quantidadeTotal !== qtde) {
                                    const primeiroLote = lotesDoProduto[0];
                                    updates[`${primeiroLote.id}/qtde`] = qtde;
                                    atualizados++;
                                } else {
                                    ignorados++;
                                }
                            } else {
                                ignorados++;
                            }
                        }
                    }
                    
                    if (Object.keys(updates).length > 0) {
                        await update(ref(db, 'validade'), updates);
                        
                        if (modoCadastro === 'cadastro') {
                            statusDiv.innerHTML = `✅ ${criados} produtos cadastrados!`;
                            Notifications.show(`${criados} produtos cadastrados com sucesso!`, 'success');
                        } else {
                            statusDiv.innerHTML = `✅ ${atualizados} produtos atualizados, ${ignorados} ignorados`;
                            Notifications.show(`${atualizados} produtos tiveram quantidades atualizadas`, 'success');
                        }
                    } else {
                        if (modoCadastro === 'atualizacao') {
                            statusDiv.innerHTML = '⚠️ Nenhuma atualização necessária';
                            Notifications.show('Todas as quantidades já estão atualizadas', 'info');
                        } else {
                            statusDiv.innerHTML = '⚠️ Nenhum produto novo para cadastrar';
                            Notifications.show('Nenhum produto novo encontrado', 'warning');
                        }
                    }
                    
                } catch (error) {
                    console.error(error);
                    statusDiv.innerHTML = '❌ Erro ao processar';
                    Notifications.show('Erro ao processar planilha', 'error');
                }
                e.target.value = '';
            });
        }, 1000);

        window.addEventListener('DOMContentLoaded', () => {
            onValue(ref(db, 'master_products'), (snap) => {
                App.state.inventory = snap.exists() ? Object.values(snap.val()) : [];
                App.ui.updateDash();
            });
            App.ui.setMode('locate');
        });
    </script>
</body>
</html>
